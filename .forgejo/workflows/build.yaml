on:
  push:
    branches:
      - main
    paths:
      - 'recipes/**/recipe.kdl'

jobs:
  detect:
    runs-on: docker-aarch64
    container:
      image: mere/ci:v0.15.2
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_recipes: ${{ steps.detect.outputs.has_recipes }}
    steps:
      - name: Git checkout
        run: |
          set -eu
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraHeader="Authorization: Bearer $GITHUB_TOKEN" \
            fetch --depth=2 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Detect changed recipes
        id: detect
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          changed=$(
            git diff --name-only HEAD~1 HEAD \
              | grep '^recipes/[^/]*/[^/]*/recipe\.kdl$' || true
          )

          if [ -z "$changed" ]; then
            printf 'No recipe changes detected.\n'
            printf 'has_recipes=false\n' >> "$GITHUB_OUTPUT"
            printf 'matrix={}\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build a JSON matrix of {recipe, arch} pairs
          recipes=$(printf '%s\n' "$changed" | jq -R . | jq -s .)
          matrix=$(printf '{"recipe":%s,"arch":["x86_64","aarch64"]}' "$recipes")
          printf 'has_recipes=true\n' >> "$GITHUB_OUTPUT"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"
          printf 'Building: %s\n' "$changed"

  build:
    needs: detect
    if: needs.detect.outputs.has_recipes == 'true'
    runs-on: ${{ matrix.arch == 'aarch64' && 'docker-aarch64' || 'docker' }}
    container:
      image: mere/ci:v0.15.2
      options: --privileged --cpus=8 --memory=12g
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    env:
      MERE_NO_HARDEN: "1"
      MERE_SIGNING_KEY: ${{ secrets.MERE_SIGNING_KEY }}
      PKGD_PUBLISH_TOKEN: ${{ secrets.PKGD_PUBLISH_TOKEN }}
    steps:
      - name: Git checkout
        run: |
          set -eu
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraHeader="Authorization: Bearer $GITHUB_TOKEN" \
            fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Setup signing key
        run: |
          set -eu
          grep -q '^root:' /etc/passwd 2>/dev/null || printf 'root:x:0:0:root:/root:/bin/sh\n' >> /etc/passwd
          install -d -m 700 /root
          install -d -m 700 /root/.mere/keys
          printf '%s' "$MERE_SIGNING_KEY" | base64 -d > /root/.mere/keys/mere.key
          chmod 600 /root/.mere/keys/mere.key

      - name: Build
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          mere dev build "${{ matrix.recipe }}"

      - name: Publish to pkgd
        run: |
          set -eu
          archives=$(find /mere/dev/outputs -name '*.pkg.tar.zst' -type f)
          if [ -z "$archives" ]; then
            printf '::error::Build produced no archives\n'
            exit 1
          fi

          curl_args="-sS --fail-with-body"
          curl_args="$curl_args -H 'Authorization: Bearer $PKGD_PUBLISH_TOKEN'"
          for archive in $archives; do
            curl_args="$curl_args -F package=@$archive"
          done

          printf 'Publishing %d archive(s) to pkgd\n' $(printf '%s\n' "$archives" | wc -l)
          eval curl $curl_args https://pkgs.merelinux.org/publish

on:
  push:
    branches:
      - main
    paths:
      - 'recipes/**/recipe.kdl'

jobs:
  detect:
    runs-on: docker
    container:
      image: mere/ci:v0.10.1
    outputs:
      recipe: ${{ steps.detect.outputs.recipe }}
    steps:
      - name: Git checkout
        run: |
          set -eu
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraHeader="Authorization: Bearer $GITHUB_TOKEN" \
            fetch --depth=2 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Detect changed recipe
        id: detect
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          changed=$(
            git diff --name-only HEAD~1 HEAD \
              | grep '^recipes/[^/]*/[^/]*/recipe\.kdl$' || true
          )

          count=$(printf '%s\n' "$changed" | grep -c . || true)
          if [ "$count" -gt 1 ]; then
            printf '::error::Multiple recipes changed in one commit. Build one package per commit.\n'
            exit 1
          fi

          if [ -z "$changed" ]; then
            printf 'No recipe changes detected.\n'
            printf 'recipe=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Building: %s\n' "$changed"
          printf 'recipe=%s\n' "$changed" >> "$GITHUB_OUTPUT"

  build-x86_64:
    needs: detect
    if: needs.detect.outputs.recipe != ''
    runs-on: docker
    container:
      image: mere/ci:v0.10.1
      options: --privileged
    env:
      MERE_SIGNING_KEY: ${{ secrets.MERE_SIGNING_KEY }}
      SYNC_SSH_KEY: ${{ secrets.SYNC_SSH_KEY }}
    steps:
      - name: Git checkout
        run: |
          set -eu
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraHeader="Authorization: Bearer $GITHUB_TOKEN" \
            fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Setup keys
        run: |
          set -eu
          grep -q '^root:' /etc/passwd 2>/dev/null || printf 'root:x:0:0:root:/root:/bin/sh\n' >> /etc/passwd
          install -d -m 700 /root
          install -d -m 700 /root/.mere/keys
          printf '%s' "$MERE_SIGNING_KEY" | base64 -d > /root/.mere/keys/mere.key
          chmod 600 /root/.mere/keys/mere.key
          install -d -m 700 /root/.ssh
          printf '%s' "$SYNC_SSH_KEY" | base64 -d > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519

      - name: Sync repo metadata down
        run: |
          set -eu
          install -d /tmp/repo/packages
          rsync -az -e "ssh -p 50220 -l pkgsync -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            pkgs.merelinux.org:/srv/pkgs.merelinux.org/mere/repo.db \
            pkgs.merelinux.org:/srv/pkgs.merelinux.org/mere/repo.db.sig \
            /tmp/repo/

      - name: Build
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          mere dev build "${{ needs.detect.outputs.recipe }}"

      - name: Import
        run: |
          set -eu
          mere dev import /tmp/repo

      - name: Sync repo up
        run: |
          set -eu
          rsync -az -e "ssh -p 50220 -l pkgsync -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            /tmp/repo/ pkgs.merelinux.org:/srv/pkgs.merelinux.org/mere/

  build-aarch64:
    needs:
      - detect
      - build-x86_64
    if: needs.detect.outputs.recipe != ''
    runs-on: docker-aarch64
    container:
      image: mere/ci:v0.10.1
      options: --privileged
    env:
      MERE_SIGNING_KEY: ${{ secrets.MERE_SIGNING_KEY }}
      SYNC_SSH_KEY: ${{ secrets.SYNC_SSH_KEY }}
    steps:
      - name: Git checkout
        run: |
          set -eu
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraHeader="Authorization: Bearer $GITHUB_TOKEN" \
            fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Setup keys
        run: |
          set -eu
          grep -q '^root:' /etc/passwd 2>/dev/null || printf 'root:x:0:0:root:/root:/bin/sh\n' >> /etc/passwd
          install -d -m 700 /root
          install -d -m 700 /root/.mere/keys
          printf '%s' "$MERE_SIGNING_KEY" | base64 -d > /root/.mere/keys/mere.key
          chmod 600 /root/.mere/keys/mere.key
          install -d -m 700 /root/.ssh
          printf '%s' "$SYNC_SSH_KEY" | base64 -d > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519

      - name: Sync repo metadata down
        run: |
          set -eu
          install -d /tmp/repo/packages
          rsync -az -e "ssh -p 50220 -l pkgsync -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            pkgs.merelinux.org:/srv/pkgs.merelinux.org/mere/repo.db \
            pkgs.merelinux.org:/srv/pkgs.merelinux.org/mere/repo.db.sig \
            /tmp/repo/

      - name: Build
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          mere dev build "${{ needs.detect.outputs.recipe }}"

      - name: Import
        run: |
          set -eu
          mere dev import /tmp/repo

      - name: Sync repo up
        run: |
          set -eu
          rsync -az -e "ssh -p 50220 -l pkgsync -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            /tmp/repo/ pkgs.merelinux.org:/srv/pkgs.merelinux.org/mere/
